<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mapbox kaart</title>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.17.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.17.0/mapbox-gl.css" rel="stylesheet"/>

<style>
@import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap");

:root {
	--brand-bg: #69aaa7;
	--brand-muted: #304649;
	--surface: #e1d5cf;
	--accent: #82333d;
	--text: #042125;
	--shadow: 0 16px 40px rgba(0,0,0,0.25);
}

body {
	margin: 0;
	font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
	color: var(--text);
	background: linear-gradient(135deg, var(--brand-bg) 0%, var(--brand-muted) 100%);
}

#map {
	height: 100vh;
	width: 100%;
}

#hover-preview {
	position: absolute;
	z-index: 10;
	max-width: 260px;
	background: rgba(255,255,255,0.95);
	border: 1px solid rgba(4,33,37,0.25);
	box-shadow: var(--shadow);
	padding: 12px 14px;
	border-radius: 18px;
	display: none;
	pointer-events: none;
}

#hover-preview img {
	width: 100%;
	border-radius: 14px;
}

.custom-marker {
	cursor: pointer;
	width: 38px;
	height: 38px;
	border-radius: 50%;
	background: var(--accent);
	display: flex;
	align-items: center;
	justify-content: center;
	font-size: 18px;
	box-shadow: 0 3px 14px rgba(0,0,0,0.35);
	border: 2.5px solid rgba(255,255,255,0.75);
	transition: box-shadow 0.15s ease;
	user-select: none;
}


.custom-marker .marker-glyph {
	display: inline-block;
	transform-origin: center;
	transition: transform 0.15s ease;
}

.custom-marker:hover .marker-glyph {
	transform: scale(1.25);
}

.custom-marker:hover {
	box-shadow: 0 6px 20px rgba(0,0,0,0.4);
}

#hover-preview h4 {
	margin: 0 0 6px 0;
	font-size: 14px;
	font-weight: 700;
	color: var(--text);
}

#hover-preview p {
	margin: 0;
	font-size: 12px;
	color: rgba(4,33,37,0.8);
}

#story-overlay {
	position: fixed;
	top: 0;
	left: 0;
	right: 0;
	bottom: 0;
	background: rgba(4,33,37,0.72);
	display: none;
	align-items: flex-start;
	justify-content: center;
	padding: 20px;
	z-index: 20;
	overflow-y: auto;
}

.story-card {
	max-width: 720px;
	width: 100%;
	background: rgba(255,255,255,0.98);
	border-radius: 20px;
	box-shadow: var(--shadow);
	padding: 28px 32px;
	position: relative;
	color: var(--text);
	margin: auto;
}
	.story-card p {
		margin: 0;
		line-height: 1.75;
		font-size: 13px;
		color: rgba(4,33,37,0.82);
		white-space: pre-line;
	}

.story-card img {
	width: 100%;
	max-width: 320px;
	border-radius: 16px;
	object-fit: cover;
	margin-top: 18px;
	margin-bottom: 18px;
}

.story-card h2 {
	margin-top: 0;
	font-size: 28px;
	font-weight: 700;
	letter-spacing: -0.02em;
}

.story-card h4 {
	margin: 10px 0 18px;
	font-size: 16px;
	font-weight: 600;
	color: rgba(4,33,37,0.75);
}

.story-card audio {
	margin: 18px 0;
	width: 100%;
}

.close-btn {
	position: absolute;
	top: 18px;
	right: 18px;
	width: 38px;
	height: 38px;
	border: none;
	border-radius: 50%;
	background: rgba(130, 51, 61, 0.18);
	color: var(--accent);
	font-size: 18px;
	font-weight: 700;
	cursor: pointer;
	transition: transform 0.18s ease, background 0.18s ease;
}

.close-btn:hover {
	transform: scale(1.08);
	background: rgba(130, 51, 61, 0.28);
}

.action-btn {
	margin-top: 20px;
	padding: 12px 18px;
	border-radius: 999px;
	border: 1px solid rgba(130, 51, 61, 0.9);
	background: rgba(130, 51, 61, 0.95);
	color: #fff;
	font-weight: 700;
	font-size: 14px;
	cursor: pointer;
	transition: transform 0.18s ease, box-shadow 0.18s ease;
}

.action-btn:hover {
	transform: translateY(-1px);
	box-shadow: 0 10px 24px rgba(0,0,0,0.14);
}

#search-box {
	position: absolute;
	top: 16px;
	left: 16px;
	z-index: 10;
	width: 280px;
}

#search-input {
	width: 100%;
	box-sizing: border-box;
	padding: 12px 16px;
	border-radius: 999px;
	border: none;
	box-shadow: 0 4px 16px rgba(0,0,0,0.22);
	font-size: 14px;
	font-family: inherit;
	outline: none;
	background: rgba(255,255,255,0.97);
	color: var(--text);
}

#search-results {
	display: none;
	background: rgba(255,255,255,0.98);
	border-radius: 14px;
	box-shadow: 0 8px 24px rgba(0,0,0,0.18);
	margin-top: 6px;
	overflow: hidden;
	max-height: 280px;
	overflow-y: auto;
}

.search-result-item {
	padding: 10px 16px;
	cursor: pointer;
	border-bottom: 1px solid rgba(4,33,37,0.07);
	font-size: 13px;
}

.search-result-item:last-child {
	border-bottom: none;
}

.search-result-item:hover {
	background: rgba(105,170,167,0.15);
}

.search-result-item strong {
	display: block;
	font-size: 14px;
	color: var(--text);
}

.search-result-item span {
	color: rgba(4,33,37,0.6);
}

#legend {
	position: absolute;
	top: 76px;
	left: 16px;
	background: white;
	padding: 12px 15px;
	border-radius: 8px;
	box-shadow: 0 0 10px rgba(0,0,0,0.2);
	font-size: 14px;
	z-index: 10;
}

#legend h3 {
	margin: 0 0 10px 0;
	font-size: 16px;
	font-weight: 700;
}

#legend div {
	margin-bottom: 5px;
	display: flex;
	align-items: center;
	gap: 8px;
}</style>

<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<div id="map"></div>

<div id="legend">
	<h3>Thema's</h3>
	<div>🐄 Dieren</div>
	<div>🤝 Hulp</div>
	<div>🔨 Heropbouw</div>
	<div>🚢 Evacuatie</div>
	<div>📖 Persoonlijke verhalen</div>
</div>

<div id="search-box">
	<input id="search-input" type="text" placeholder="Zoek op naam, verhaal of adres…" autocomplete="off">
	<div id="search-results"></div>
</div>

<div id="hover-preview"></div>
<div id="story-overlay"></div>

<script>
mapboxgl.accessToken = 'pk.eyJ1Ijoid3VtbWFwcGluZyIsImEiOiJjbW10N2lxZmsxb3R0MnBzYjFkYjhubDJpIn0.F9yDWcxAbfO87mHn4cm7Yw';

function normalizeTheme(theme) {
	const value = (theme || '').trim().toLowerCase();
	if (value === 'redding') return 'hulp';
	if (["dieren", "hulp", "heropbouw", "evacuatie", "persoonlijke verhalen"].includes(value)) {
		return value;
	}
	return 'persoonlijke verhalen';
}

function getThemeMeta(theme) {
	const normalizedTheme = normalizeTheme(theme);
	if (normalizedTheme === 'dieren') return { icon: '🐄', label: 'Dieren' };
	if (normalizedTheme === 'hulp') return { icon: '🤝', label: 'Hulp' };
	if (normalizedTheme === 'heropbouw') return { icon: '🔨', label: 'Heropbouw' };
	if (normalizedTheme === 'evacuatie') return { icon: '🚢', label: 'Evacuatie' };
	return { icon: '📖', label: 'Persoonlijke verhalen' };
}

const allMarkerData = [];

const map = new mapboxgl.Map({
	container: 'map',
	style: 'mapbox://styles/wummapping/cmmt6v97x004i01qvczs79r9u',
	center: [4.1, 51.75],
	zoom: 10
});

// Wacht tot de map klaar is
map.on('load', function() {
	Papa.parse("https://docs.google.com/spreadsheets/d/e/2PACX-1vQrpt6_4fEi8-QcueLgMHuZ_bmM_jsEm7dHpvhkiCWkWkXp8kfQap0ka1zxK9cj76P7543Ojoneuwrv/pub?gid=1336477714&single=true&output=csv", {
		download: true,
		header: true,
		complete: function(results) {
			const firstRow = results.data[0];
			console.log('Eerste rij:', firstRow);
			console.log('Kolomnamen:', Object.keys(firstRow));
			results.data.forEach(function(row) {
					const lat = row.Latitude || row['Latitude '] || row[' Latitude'] || row['latitude'] || row['latitude '];
					const lng = row.Longitude || row['Longitude '] || row[' Longitude'] || row['longitude'] || row['longitude '];
					if(lat && lng) {
					const themeMeta = getThemeMeta(row.Theme || '');
					const lngLat = [parseFloat(lng), parseFloat(lat)];
					const el = document.createElement('div');
					el.className = 'custom-marker';
					el.innerHTML = `<span class="marker-glyph">${themeMeta.icon}</span>`;

					const marker = new mapboxgl.Marker({ element: el })
						.setLngLat(lngLat)
						.addTo(map);
					allMarkerData.push({ row, marker, lngLat, themeMeta });

					el.addEventListener("mouseenter", () => {
						const preview = document.getElementById("hover-preview");
						preview.innerHTML = `
							<img src="${row.ImageURL || ''}" alt="Foto van ${row.Name || ''}">
							<h3>${row.Title || ''}</h3>
							<p>${row.Name || ''} – ${row.Age || ''}</p>
							<p>${themeMeta.icon} ${themeMeta.label}</p>
						`;
						const point = map.project(lngLat);
						preview.style.left = (point.x + 22) + "px";
						preview.style.top = (point.y - 80) + "px";
						preview.style.display = "block";
					});

					el.addEventListener("mouseleave", () => {
						document.getElementById("hover-preview").style.display = "none";
					});

						el.addEventListener("click",()=>{
							const overlay = document.getElementById("story-overlay");
						overlay.style.display = "flex";
						overlay.innerHTML = `
							<div class="story-card" role="dialog" aria-modal="true">
								<button class="close-btn" aria-label="Sluiten" onclick="document.getElementById('story-overlay').style.display='none'">×</button>
								<h2>${row.Title || ''}</h2>
								<h4>${row.Name || ''} – ${row.Age || ''}</h4>
								<img src="${row.ImageURL || ''}" alt="Foto van ${row.Name || ''}">
								<audio controls src="${row.AudioURL || ''}"></audio>
								<p>${row.Story || ''}</p>
							</div>
						`;
						overlay.addEventListener('click', (ev) => {
							if (ev.target === overlay) {
								overlay.style.display = 'none';
							}
						});
						});
					}
			});

			// Zoekfunctie
			const searchInput = document.getElementById('search-input');
			const searchResults = document.getElementById('search-results');

			function openStory(row) {
				const overlay = document.getElementById('story-overlay');
				overlay.style.display = 'flex';
				overlay.innerHTML = `
					<div class="story-card" role="dialog" aria-modal="true">
						<button class="close-btn" aria-label="Sluiten" onclick="document.getElementById('story-overlay').style.display='none'">×</button>
						<h2>${row.Title || ''}</h2>
						<h4>${row.Name || ''} – ${row.Age || ''}</h4>
						<img src="${row.ImageURL || ''}" alt="Foto van ${row.Name || ''}">
						<audio controls src="${row.AudioURL || ''}"></audio>
						<p>${row.Story || ''}</p>
					</div>
				`;
				overlay.addEventListener('click', (ev) => {
					if (ev.target === overlay) overlay.style.display = 'none';
				});
			}

			searchInput.addEventListener('input', () => {
				const q = searchInput.value.trim().toLowerCase();
				if (!q) { searchResults.style.display = 'none'; return; }
				const matches = allMarkerData.filter(({ row }) =>
					(row.Name || '').toLowerCase().includes(q) ||
					(row.Title || '').toLowerCase().includes(q) ||
					(row.Story || '').toLowerCase().includes(q) ||
					(row.Address || row.Adres || '').toLowerCase().includes(q)
				);
				if (matches.length === 0) {
					searchResults.innerHTML = '<div class="search-result-item">Geen resultaten gevonden</div>';
				} else {
					searchResults.innerHTML = matches.slice(0, 10).map((item, i) => {
						const addr = item.row.Address || item.row.Adres || '';
						return `<div class="search-result-item" data-index="${i}">
							<strong>${item.row.Title || item.row.Name || ''}</strong>
							<span>${item.row.Name || ''}${addr ? ' · ' + addr : ''}</span>
						</div>`;
					}).join('');
					searchResults.querySelectorAll('.search-result-item').forEach((el, i) => {
						el.addEventListener('click', () => {
							const { row, lngLat } = matches[i];
							map.flyTo({ center: lngLat, zoom: 14 });
							searchResults.style.display = 'none';
							searchInput.value = '';
							setTimeout(() => openStory(row), 600);
						});
					});
				}
				searchResults.style.display = 'block';
			});

			document.addEventListener('click', (e) => {
				if (!document.getElementById('search-box').contains(e.target)) {
					searchResults.style.display = 'none';
				}
			});
		}
	});
});
</script>
</body>
</html>
